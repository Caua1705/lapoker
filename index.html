<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alá Poker Private Club — A Private Table for Selected Players</title>
  <meta name="description" content="Exclusive poker nights for selected guests in a refined private setting." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* ─── TOKENS ─── */
    :root {
      --black:      #050505;
      --gold:       #C9A84C;
      --gold-light: #E2C882;
      --gold-dim:   #8A6D2A;
      --white:      #ffffff;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --sans:       'Inter', sans-serif;
      --manrope:    'Manrope', sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: overlay;
      opacity: 0.55;
    }

    /* ─── HERO SECTION ─── */
    #hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: clamp(80px, 12vh, 120px) clamp(24px, 5vw, 80px);
    }

    /* ─── SCROLL-DRIVEN FRAME CANVAS BACKGROUND ─── */
    .hero-canvas-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .hero-canvas-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── DARK OVERLAY ─── */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.52) 0%,
          rgba(0,0,0,0.30) 45%,
          rgba(0,0,0,0.65) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ─── HERO INNER (above canvas) ─── */
    .hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1100px;
    }

    /* ─── CORNER ORNAMENTS ─── */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: 0;
      z-index: 2;
    }
    .corner-tl { top: clamp(24px,4vw,48px); left: clamp(24px,4vw,48px);   border-top:    1px solid var(--gold-dim); border-left:  1px solid var(--gold-dim); }
    .corner-tr { top: clamp(24px,4vw,48px); right: clamp(24px,4vw,48px);  border-top:    1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }
    .corner-bl { bottom: clamp(24px,4vw,48px); left: clamp(24px,4vw,48px);  border-bottom: 1px solid var(--gold-dim); border-left:  1px solid var(--gold-dim); }
    .corner-br { bottom: clamp(24px,4vw,48px); right: clamp(24px,4vw,48px); border-bottom: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }

    /* ─── TOP LABEL ─── */
    .hero-label {
      font-family: var(--manrope);
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 500;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 40px;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-label::before { content:''; display:block; width:28px; height:1px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
    .hero-label::after  { content:''; display:block; width:28px; height:1px; background: linear-gradient(90deg, var(--gold-dim), transparent); }

    /* ─── GOLD DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      width: clamp(120px, 22vw, 280px);
      opacity: 0;
    }
    .divider-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }
    .divider-gem  { width:4px; height:4px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; box-shadow:0 0 6px var(--gold); }

    /* ─── HEADLINE ─── */
    .hero-headline {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(28px, 4.4vw, 62px);
      line-height: 1.16;
      letter-spacing: -0.01em;
      text-align: center;
      color: var(--white);
      max-width: 760px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(24px);
    }
    .hero-headline em { font-style: italic; color: var(--gold-light); }

    /* ─── SUBHEADLINE ─── */
    .hero-sub {
      font-family: var(--sans);
      font-size: clamp(13px, 1.4vw, 15px);
      font-weight: 300;
      line-height: 1.75;
      text-align: center;
      color: rgba(255,255,255,0.42);
      max-width: 460px;
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(16px);
    }

    /* ─── CTA ─── */
    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(12px);
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--manrope);
      font-size: clamp(10px, 1.1vw, 12px);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      padding: clamp(14px, 1.8vw, 18px) clamp(28px, 3.5vw, 44px);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
    }

    /* Primary — gold */
    .btn-primary {
      background: var(--gold);
      color: var(--black);
      border: 1px solid var(--gold);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      box-shadow: 0 4px 28px rgba(201,168,76,0.35);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0) scale(0.98); }

    /* Secondary — outlined */
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(201,168,76,0.3);
    }
    .btn-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(201,168,76,0.05);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-secondary:hover::before { opacity: 1; }
    .btn-secondary:hover {
      color: var(--gold-light);
      border-color: rgba(201,168,76,0.6);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0) scale(0.98); }

    /* Conic spinning border on hover */
    .btn-secondary .btn-spin {
      position: absolute;
      inset: -1px;
      background: conic-gradient(from 90deg at 50% 50%, transparent 0%, transparent 85%, var(--gold) 100%);
      opacity: 0;
      animation: spin 3s linear infinite;
      transition: opacity 0.3s;
    }
    .btn-secondary:hover .btn-spin { opacity: 1; }
    .btn-secondary .btn-inner {
      position: absolute;
      inset: 1px;
      background: var(--black);
      z-index: 0;
    }
    .btn-secondary span { position: relative; z-index: 1; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── DISCLAIMER ─── */
    .hero-disclaimer {
      font-family: var(--manrope);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      text-align: center;
      opacity: 0;
    }

    /* ─── BOTTOM WATERMARK ─── */
    .hero-watermark {
      position: absolute;
      bottom: clamp(24px, 4vw, 40px);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--manrope);
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.28);
      white-space: nowrap;
      opacity: 0;
      z-index: 3;
    }

    /* ─── SCROLL SPACER ─── */
    .scroll-spacer {
      height: 300vh;
      position: relative;
      z-index: -1;
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      .hero-label, .divider, .hero-headline,
      .hero-sub, .hero-cta, .hero-disclaimer, .hero-watermark, .corner {
        opacity: 1 !important;
        transform: none !important;
      }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .hero-label { font-size: 9px; letter-spacing: 0.28em; margin-bottom: 28px; }
      .hero-headline { font-size: clamp(26px, 6.8vw, 44px); }
      .hero-sub { font-size: 13px; }
      .btn { padding: 14px 28px; font-size: 10px; }
      .corner { width: 14px; height: 14px; }
    }
    @media (max-width: 480px) {
      .hero-cta { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Scroll-driven hero wrapper — pinned while frames play -->
<div id="heroWrapper">

<section id="hero" aria-label="Alá Poker Private Club">

  <!-- Scroll-driven canvas background (replaces video) -->
  <div class="hero-canvas-wrap">
    <canvas id="heroCanvas"></canvas>
  </div>

  <!-- Dark overlay for readability -->
  <div class="hero-overlay" aria-hidden="true"></div>

  <!-- Corner ornaments -->
  <div class="corner corner-tl" id="cTL"></div>
  <div class="corner corner-tr" id="cTR"></div>
  <div class="corner corner-bl" id="cBL"></div>
  <div class="corner corner-br" id="cBR"></div>

  <!-- Hero content -->
  <div class="hero-inner">

    <!-- Top label -->
    <p class="hero-label" id="heroLabel">Private Members Club</p>

    <!-- Divider -->
    <div class="divider" id="heroDivider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Headline -->
    <h1 class="hero-headline" id="heroHeadline">
      A Private Table for <em>Selected Players.</em>
    </h1>

    <!-- Subheadline -->
    <p class="hero-sub" id="heroSub">
      Exclusive poker nights for selected guests<br />
      in a refined private setting.
    </p>

    <!-- CTA -->
    <div class="hero-cta" id="heroCta">
      <a href="#" class="btn btn-primary" id="btnPrimary">Request Access</a>
      <a href="#" class="btn btn-secondary" id="btnSecondary">
        <div class="btn-spin" aria-hidden="true"></div>
        <div class="btn-inner" aria-hidden="true"></div>
        <span>Discover the Club</span>
      </a>
    </div>

    <!-- Disclaimer -->
    <p class="hero-disclaimer" id="heroDisclaimer">
      Limited spots &bull; Registration subject to approval &bull; 18+
    </p>

  </div><!-- /.hero-inner -->

  <!-- Watermark -->
  <p class="hero-watermark" id="heroWatermark">Alá Poker &mdash; Est. 2024</p>

</section>

<!-- Extra scroll space so the user can scroll through frames -->
<div class="scroll-spacer"></div>

</div><!-- /#heroWrapper -->

<script>
(function () {
  /* ─── SCROLL-DRIVEN FRAME SEQUENCE ─── */
  gsap.registerPlugin(ScrollTrigger);

  const TOTAL_FRAMES = 150;
  const canvas = document.getElementById('heroCanvas');
  const ctx = canvas.getContext('2d');

  // Preload all frames
  const frames = [];
  let loadedCount = 0;
  const currentFrame = { index: 0 };

  function framePath(i) {
    return 'frames/frame_' + String(i).padStart(4, '0') + '.webp';
  }

  function drawFrame(index) {
    const img = frames[index];
    if (!img || !img.complete || !img.naturalWidth) return;

    // Match canvas internal resolution to display size
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const cw = rect.width * dpr;
    const ch = rect.height * dpr;

    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width = cw;
      canvas.height = ch;
    }

    // Cover-fit the image onto the canvas
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const canvasRatio = cw / ch;

    let sw, sh, sx, sy;
    if (imgRatio > canvasRatio) {
      // Image is wider — crop sides
      sh = img.naturalHeight;
      sw = sh * canvasRatio;
      sx = (img.naturalWidth - sw) / 2;
      sy = 0;
    } else {
      // Image is taller — crop top/bottom
      sw = img.naturalWidth;
      sh = sw / canvasRatio;
      sx = 0;
      sy = (img.naturalHeight - sh) / 2;
    }

    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
  }

  // Load images
  for (let i = 0; i < TOTAL_FRAMES; i++) {
    const img = new Image();
    img.src = framePath(i);
    img.onload = function () {
      loadedCount++;
      // Draw first frame as soon as it's ready
      if (i === 0) drawFrame(0);
    };
    frames.push(img);
  }

  // Pin the hero and scrub through frames on scroll
  const heroWrapper = document.getElementById('heroWrapper');
  const heroSection = document.getElementById('hero');

  ScrollTrigger.create({
    trigger: heroWrapper,
    start: 'top top',
    end: 'bottom bottom',
    pin: heroSection,
    scrub: 0.15,
    onUpdate: function (self) {
      const progress = self.progress;
      const frameIndex = Math.min(
        TOTAL_FRAMES - 1,
        Math.floor(progress * TOTAL_FRAMES)
      );
      if (frameIndex !== currentFrame.index) {
        currentFrame.index = frameIndex;
        drawFrame(frameIndex);
      }
    }
  });

  // Resize canvas on window resize
  window.addEventListener('resize', function () {
    drawFrame(currentFrame.index);
  });

  /* ─── INTRO ANIMATIONS (unchanged) ─── */
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  CustomEase.create('luxury', 'M0,0 C0.16,1 0.3,1 1,1');

  const tl = gsap.timeline({ defaults: { ease: 'luxury' } });

  /* Initial states */
  gsap.set([
    '#heroLabel', '#heroDivider', '#heroHeadline',
    '#heroSub', '#heroCta', '#heroDisclaimer',
    '#heroWatermark', '#cTL', '#cTR', '#cBL', '#cBR'
  ], { opacity: 0 });

  gsap.set('#heroDivider', { scaleX: 0 });

  /* Staggered reveal */
  tl.to(['#cTL', '#cTR', '#cBL', '#cBR'], {
    opacity: 1, duration: 1.0, stagger: 0.12, ease: 'power2.out'
  }, 0.4);

  tl.to('#heroLabel', {
    opacity: 1, duration: 1.0, ease: 'power2.out'
  }, 0.7);

  tl.to('#heroDivider', {
    opacity: 1, scaleX: 1, duration: 0.9,
    transformOrigin: 'center center', ease: 'power2.inOut'
  }, 1.1);

  tl.to('#heroHeadline', {
    opacity: 1, y: 0, duration: 1.1, ease: 'power3.out'
  }, 1.4);

  tl.to('#heroSub', {
    opacity: 1, y: 0, duration: 1.0, ease: 'power2.out'
  }, 2.0);

  tl.to('#heroCta', {
    opacity: 1, y: 0, duration: 0.9, ease: 'power2.out'
  }, 2.5);

  tl.to('#heroDisclaimer', {
    opacity: 1, duration: 0.8, ease: 'power2.out'
  }, 3.0);

  tl.to('#heroWatermark', {
    opacity: 1, duration: 0.8, ease: 'power2.out'
  }, 3.2);

})();
</script>

</body>
</html>
