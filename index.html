<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alá Poker — Private Members Club</title>
  <meta name="description" content="Private poker nights for selected guests in a refined, discreet and high-standard setting." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    /* ── TOKENS ── */
    :root {
      --black:      #060606;
      --gold:       #C9A84C;
      --gold-light: #E2C882;
      --gold-dim:   #7A6230;
      --gold-faint: rgba(201,168,76,0.12);
      --white:      #ffffff;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --sans:       'Manrope', sans-serif;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px clamp(32px, 5vw, 80px);
      background: linear-gradient(to bottom, rgba(6,6,6,0.85) 0%, transparent 100%);
      backdrop-filter: blur(0px);
      opacity: 0;
    }

    .nav-brand {
      font-family: var(--serif);
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-brand span { color: var(--gold); }

    .nav-links {
      display: flex;
      gap: clamp(24px, 3vw, 48px);
      list-style: none;
    }
    .nav-links a {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold-light); }

    .nav-cta {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.35);
      padding: 10px 24px;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .nav-cta:hover {
      background: var(--gold);
      color: var(--black);
      border-color: var(--gold);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }

    /* ── HERO WRAPPER (scroll pin container) ── */
    #heroWrapper { position: relative; }

    /* ── HERO SECTION ── */
    #hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      overflow: hidden;
      background: var(--black);
    }

    /* ── LEFT ZONE ── */
    .hero-left {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: clamp(100px, 14vh, 140px) clamp(32px, 4vw, 64px) clamp(60px, 8vh, 100px) clamp(48px, 7vw, 120px);
    }

    /* ── TOP LABEL ── */
    .hero-label {
      font-family: var(--sans);
      font-size: clamp(9px, 0.9vw, 11px);
      font-weight: 500;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 36px;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-label::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--gold-dim);
      flex-shrink: 0;
    }

    /* ── HEADLINE ── */
    .hero-headline {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(38px, 4.8vw, 76px);
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: var(--white);
      max-width: 580px;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
    }
    .hero-headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* Gold rule below headline */
    .hero-rule {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
      margin-bottom: 28px;
      opacity: 0;
    }

    /* ── SUBHEADLINE ── */
    .hero-sub {
      font-family: var(--sans);
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 300;
      line-height: 1.80;
      color: rgba(255,255,255,0.38);
      max-width: 400px;
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(12px);
    }

    /* ── CTA BUTTON ── */
    .btn-primary {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--sans);
      font-size: clamp(11px, 1vw, 13px);
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      background: var(--gold);
      border: 1px solid var(--gold);
      padding: clamp(16px, 1.8vw, 20px) clamp(36px, 3.5vw, 52px);
      margin-bottom: 28px;
      overflow: hidden;
      transition: background 0.4s, box-shadow 0.4s, transform 0.3s;
      opacity: 0;
      transform: translateY(10px);
    }
    .btn-primary::after {
      content: '→';
      opacity: 0.7;
      transition: transform 0.3s;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.16) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      box-shadow: 0 8px 40px rgba(201,168,76,0.28);
      transform: translateY(-2px) !important;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover::after { transform: translateX(4px); }
    .btn-primary:active { transform: scale(0.98) !important; }

    /* ── DISCLAIMER ── */
    .hero-disclaimer {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.16);
      opacity: 0;
    }

    /* ── RIGHT ZONE ── */
    .hero-right {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(80px, 10vh, 120px) clamp(24px, 4vw, 60px) clamp(80px, 10vh, 120px) 0;
      height: 100%;
    }

    /* ── VIDEO FRAME ── */
    .video-frame {
      position: relative;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(201,168,76,0.14);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        0 24px 80px rgba(0,0,0,0.7),
        0 0 100px rgba(201,168,76,0.04);
      opacity: 0;
      transform: scale(0.96) translateX(20px);
    }

    .video-frame canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Subtle vignette inside video frame */
    .video-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(6,6,6,0.30) 0%,
        transparent 40%,
        transparent 70%,
        rgba(6,6,6,0.20) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── AMBIENT GLOW (behind video frame) ── */
    .hero-right::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 70%;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCROLL SPACER ── */
    .scroll-spacer {
      height: 300vh;
      position: relative;
      z-index: -1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      #hero {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
      }
      .hero-left {
        padding: 120px 32px 40px 32px;
        align-items: center;
        text-align: center;
      }
      .hero-label::before { display: none; }
      .hero-headline { text-align: center; }
      .hero-sub { text-align: center; }
      .hero-right {
        padding: 0 32px 64px 32px;
        justify-content: center;
      }
      .video-frame { max-width: 100%; }
    }

    @media (max-width: 480px) {
      .btn-primary { width: 100%; justify-content: center; }
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      .hero-label, .hero-headline, .hero-rule, .hero-sub,
      .btn-primary, .hero-disclaimer, .video-frame, #navbar {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav id="navbar" aria-label="Main navigation">
  <a class="nav-brand" href="#">Alá <span>Poker</span></a>
  <ul class="nav-links">
    <li><a href="#">Experience</a></li>
    <li><a href="#">Private Table</a></li>
    <li><a href="#">Access</a></li>
  </ul>
  <a class="nav-cta" href="#">Request Access</a>
</nav>

<!-- ── SCROLL WRAPPER ── -->
<div id="heroWrapper">

  <section id="hero" aria-label="Alá Poker Private Members Club">

    <!-- LEFT: text content -->
    <div class="hero-left">
      <p class="hero-label" id="heroLabel">Private Members Club</p>

      <h1 class="hero-headline" id="heroHeadline">
        An Exclusive Table,<br><em>Reserved for a Few.</em>
      </h1>

      <div class="hero-rule" id="heroRule"></div>

      <p class="hero-sub" id="heroSub">
        Private poker nights for selected guests in a refined,
        discreet and high-standard setting.
      </p>

      <a href="#" class="btn-primary" id="heroCta">Request Access</a>

      <p class="hero-disclaimer" id="heroDisclaimer">
        Limited spots &bull; Registration subject to approval &bull; 18+
      </p>
    </div>

    <!-- RIGHT: cinematic video frame -->
    <div class="hero-right">
      <div class="video-frame" id="videoFrame">
        <canvas id="heroCanvas"></canvas>
      </div>
    </div>

  </section>

  <div class="scroll-spacer"></div>

</div><!-- /#heroWrapper -->

<script>
(function () {

  /* ── SCROLL-DRIVEN FRAME SEQUENCE ── */
  gsap.registerPlugin(ScrollTrigger);

  const TOTAL_FRAMES = 150;
  const canvas = document.getElementById('heroCanvas');
  const ctx    = canvas.getContext('2d');
  const frames = [];
  const cur    = { index: 0 };

  function framePath(i) {
    return 'frames/frame_' + String(i).padStart(4, '0') + '.webp';
  }

  function drawFrame(index) {
    const img = frames[index];
    if (!img || !img.complete || !img.naturalWidth) return;

    const rect = canvas.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    const cw   = rect.width  * dpr;
    const ch   = rect.height * dpr;

    if (canvas.width !== cw || canvas.height !== ch) {
      canvas.width  = cw;
      canvas.height = ch;
    }

    const ir = img.naturalWidth / img.naturalHeight;
    const cr = cw / ch;
    let sw, sh, sx, sy;
    if (ir > cr) {
      sh = img.naturalHeight; sw = sh * cr;
      sx = (img.naturalWidth - sw) / 2; sy = 0;
    } else {
      sw = img.naturalWidth; sh = sw / cr;
      sx = 0; sy = (img.naturalHeight - sh) / 2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, cw, ch);
  }

  for (let i = 0; i < TOTAL_FRAMES; i++) {
    const img = new Image();
    img.src = framePath(i);
    img.onload = () => { if (i === 0) drawFrame(0); };
    frames.push(img);
  }

  ScrollTrigger.create({
    trigger: '#heroWrapper',
    start:   'top top',
    end:     'bottom bottom',
    pin:     '#hero',
    scrub:   0.2,
    onUpdate(self) {
      const idx = Math.min(TOTAL_FRAMES - 1, Math.floor(self.progress * TOTAL_FRAMES));
      if (idx !== cur.index) { cur.index = idx; drawFrame(idx); }
    }
  });

  window.addEventListener('resize', () => drawFrame(cur.index));

  /* ── GSAP ENTRANCE ANIMATIONS ── */
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  CustomEase.create('lux', 'M0,0 C0.16,1 0.3,1 1,1');

  const tl = gsap.timeline({ defaults: { ease: 'lux' } });

  /* Initial hidden states */
  gsap.set('#navbar',         { opacity: 0, y: -16 });
  gsap.set('#heroLabel',      { opacity: 0, x: -12 });
  gsap.set('#heroHeadline',   { opacity: 0, y: 24 });
  gsap.set('#heroRule',       { opacity: 0, scaleX: 0, transformOrigin: 'left center' });
  gsap.set('#heroSub',        { opacity: 0, y: 12 });
  gsap.set('#heroCta',        { opacity: 0, y: 10 });
  gsap.set('#heroDisclaimer', { opacity: 0 });
  gsap.set('#videoFrame',     { opacity: 0, scale: 0.95, x: 24 });

  /* Sequence */
  tl.to('#navbar',         { opacity: 1, y: 0, duration: 1.0, ease: 'power2.out' }, 0.1);
  tl.to('#heroLabel',      { opacity: 1, x: 0, duration: 0.9, ease: 'power2.out' }, 0.6);
  tl.to('#heroHeadline',   { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out' }, 1.0);
  tl.to('#heroRule',       { opacity: 1, scaleX: 1, duration: 0.8, ease: 'power2.inOut' }, 1.8);
  tl.to('#heroSub',        { opacity: 1, y: 0, duration: 1.0, ease: 'power2.out' }, 2.0);
  tl.to('#heroCta',        { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out' }, 2.5);
  tl.to('#heroDisclaimer', { opacity: 1, duration: 0.8 }, 2.9);
  tl.to('#videoFrame',     { opacity: 1, scale: 1, x: 0, duration: 1.4, ease: 'power2.out' }, 0.8);

})();
</script>
</body>
</html>
