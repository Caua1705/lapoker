<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alá Poker Private Club — A Private Table for Those Who Play Differently</title>
  <meta name="description" content="An exclusive poker experience designed for selected guests, refined nights and a higher standard of play." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>

  <!-- SplitType CDN -->
  <script src="https://unpkg.com/split-type@0.3.4/umd/index.min.js"></script>

  <style>
    /* ─── DESIGN TOKENS ─── */
    :root {
      --black:      #050505;
      --black-soft: #0a0a0a;
      --gold:       #C9A84C;
      --gold-light: #E2C882;
      --gold-dim:   #8A6D2A;
      --gold-glow:  rgba(201,168,76,0.18);
      --white:      #ffffff;
      --white-40:   rgba(255,255,255,0.4);
      --white-10:   rgba(255,255,255,0.08);
      --serif:      'Cormorant Garamond', Georgia, serif;
      --sans:       'Inter', sans-serif;
      --manrope:    'Manrope', sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
      opacity: 0.6;
    }

    /* ─── VIGNETTE ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ─── HERO SECTION ─── */
    #hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 2;
    }

    /* ─── RADIAL GOLD GLOW behind logo ─── */
    .hero-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -56%);
      width: clamp(380px, 55vw, 720px);
      height: clamp(380px, 55vw, 720px);
      background: radial-gradient(ellipse at center,
        rgba(201,168,76,0.14) 0%,
        rgba(201,168,76,0.06) 35%,
        transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      will-change: opacity;
      z-index: 0;
    }

    /* ─── HERO INNER ─── */
    .hero-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      padding: 0 clamp(20px, 5vw, 80px);
      gap: 0;
    }

    /* ─── LABEL TOP ─── */
    .hero-label {
      font-family: var(--manrope);
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 52px;
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-label::before,
    .hero-label::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim));
    }
    .hero-label::after {
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    /* ─── LOGO WRAPPER ─── */
    .logo-wrap {
      position: relative;
      width: clamp(220px, 38vw, 520px);
      margin-bottom: 52px;
      opacity: 0;
      will-change: opacity, transform, filter;
    }
    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      /* Invert white BG logo to transparent/gold */
      filter: invert(1) sepia(1) saturate(1.8) hue-rotate(2deg) brightness(0.88);
    }

    /* Metallic light sweep overlay */
    .logo-sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(201,168,76,0.22) 50%,
        transparent 70%
      );
      background-size: 300% 100%;
      background-position: -100% 0;
      pointer-events: none;
      border-radius: 4px;
      opacity: 0;
    }

    /* ─── GOLD DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
      width: clamp(160px, 30vw, 360px);
      opacity: 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .divider-gem {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--gold);
    }

    /* ─── HEADLINE ─── */
    .hero-headline {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(26px, 4.2vw, 62px);
      line-height: 1.18;
      letter-spacing: -0.01em;
      text-align: center;
      color: var(--white);
      margin-bottom: 22px;
      max-width: 820px;
      opacity: 0;
      will-change: opacity, transform;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* ─── SUBHEADLINE ─── */
    .hero-subheadline {
      font-family: var(--sans);
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      line-height: 1.75;
      text-align: center;
      color: rgba(255,255,255,0.42);
      max-width: 540px;
      margin-bottom: 52px;
      opacity: 0;
      will-change: opacity, transform;
    }

    /* ─── CTA BUTTONS ─── */
    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--manrope);
      font-size: clamp(10px, 1.1vw, 12px);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      padding: clamp(14px, 1.8vw, 18px) clamp(28px, 3.5vw, 44px);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
    }

    /* Primary — gold */
    .btn-primary {
      background: transparent;
      color: var(--black);
      border: 1px solid var(--gold);
      background: var(--gold);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      box-shadow: 0 4px 28px rgba(201,168,76,0.35);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0) scale(0.98); }

    /* Secondary — outlined */
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.65);
      border: 1px solid rgba(201,168,76,0.3);
    }
    .btn-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(201,168,76,0.05);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .btn-secondary:hover::before { opacity: 1; }
    .btn-secondary:hover {
      color: var(--gold-light);
      border-color: rgba(201,168,76,0.6);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: translateY(0) scale(0.98); }

    /* Conic spinning border on hover for secondary */
    .btn-secondary .btn-spin {
      position: absolute;
      inset: -1px;
      background: conic-gradient(from 90deg at 50% 50%, transparent 0%, transparent 85%, var(--gold) 100%);
      opacity: 0;
      animation: spin 3s linear infinite;
      transition: opacity 0.3s;
    }
    .btn-secondary:hover .btn-spin { opacity: 1; }
    .btn-secondary .btn-inner {
      position: absolute;
      inset: 1px;
      background: var(--black);
      z-index: 0;
    }
    .btn-secondary span { position: relative; z-index: 1; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─── CORNER ORNAMENTS ─── */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      pointer-events: none;
      opacity: 0;
    }
    .corner-tl { top: clamp(24px, 4vw, 48px); left: clamp(24px, 4vw, 48px); border-top: 1px solid var(--gold-dim); border-left: 1px solid var(--gold-dim); }
    .corner-tr { top: clamp(24px, 4vw, 48px); right: clamp(24px, 4vw, 48px); border-top: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }
    .corner-bl { bottom: clamp(24px, 4vw, 48px); left: clamp(24px, 4vw, 48px); border-bottom: 1px solid var(--gold-dim); border-left: 1px solid var(--gold-dim); }
    .corner-br { bottom: clamp(24px, 4vw, 48px); right: clamp(24px, 4vw, 48px); border-bottom: 1px solid var(--gold-dim); border-right: 1px solid var(--gold-dim); }

    /* ─── BOTTOM LABEL ─── */
    .hero-bottom-label {
      position: absolute;
      bottom: clamp(24px, 4vw, 40px);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--manrope);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.35);
      white-space: nowrap;
      opacity: 0;
      z-index: 3;
    }

    /* ─── WORD SPLIT CLASSES ─── */
    .word { display: inline-block; overflow: hidden; vertical-align: bottom; }
    .word-inner {
      display: inline-block;
      transform: translateY(110%);
      opacity: 0;
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      .hero-glow, .logo-wrap, .hero-label, .divider, .hero-headline,
      .hero-subheadline, .hero-cta, .corner, .hero-bottom-label {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }
      .logo-wrap img { filter: invert(1) sepia(1) saturate(1.8) hue-rotate(2deg) brightness(0.88); }
      .word-inner { transform: none !important; opacity: 1 !important; }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .hero-inner { gap: 0; }
      .hero-label { margin-bottom: 36px; font-size: 9px; letter-spacing: 0.28em; }
      .logo-wrap { width: clamp(180px, 68vw, 320px); margin-bottom: 36px; }
      .hero-headline { font-size: clamp(24px, 6.5vw, 42px); }
      .hero-subheadline { font-size: 13px; }
      .btn { padding: 14px 28px; font-size: 10px; }
      .corner { width: 14px; height: 14px; }
    }
    @media (max-width: 480px) {
      .hero-cta { flex-direction: column; width: 100%; max-width: 280px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<section id="hero" aria-label="Alá Poker Private Club Hero">

  <!-- Background gold glow -->
  <div class="hero-glow" id="heroGlow"></div>

  <!-- Corner ornaments -->
  <div class="corner corner-tl" id="cTL"></div>
  <div class="corner corner-tr" id="cTR"></div>
  <div class="corner corner-bl" id="cBL"></div>
  <div class="corner corner-br" id="cBR"></div>

  <!-- Main hero content -->
  <div class="hero-inner">

    <!-- Top label -->
    <p class="hero-label" id="heroLabel" aria-label="Private Members Club">Private Members Club</p>

    <!-- Logo -->
    <div class="logo-wrap" id="logoWrap" role="img" aria-label="Alá Poker logo">
      <img
        src="assets/Design sem nome (1).svg"
        alt="Alá Poker Private Club"
        id="logoImg"
        loading="eager"
        decoding="async"
      />
      <div class="logo-sweep" id="logoSweep"></div>
    </div>

    <!-- Divider -->
    <div class="divider" id="heroDivider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Headline -->
    <h1 class="hero-headline" id="heroHeadline">
      A Private Table for Those<br />Who <em>Play Differently.</em>
    </h1>

    <!-- Subheadline -->
    <p class="hero-subheadline" id="heroSub">
      An exclusive poker experience designed for selected guests,<br />
      refined nights and a higher standard of play.
    </p>

    <!-- CTA Buttons -->
    <div class="hero-cta" id="heroCta">
      <a href="#" class="btn btn-primary" id="btnPrimary">Request Access</a>
      <a href="#" class="btn btn-secondary" id="btnSecondary">
        <div class="btn-spin" aria-hidden="true"></div>
        <div class="btn-inner" aria-hidden="true"></div>
        <span>Discover the Club</span>
      </a>
    </div>

  </div><!-- /.hero-inner -->

  <!-- Bottom watermark -->
  <p class="hero-bottom-label" id="heroBottomLabel">Alá Poker &mdash; Est. 2024</p>

</section>

<script>
(function () {
  /* ── Respect reduced motion ── */
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  /* ── Wait for DOM + fonts ── */
  document.addEventListener('DOMContentLoaded', () => {
    // Use GSAP CustomEase for cinematic easing
    CustomEase.create('luxury', 'M0,0 C0.16,1 0.3,1 1,1');
    CustomEase.create('silkIn', 'M0,0 C0.05,0 0.133,0.25 0.25,0.5 0.4,0.75 0.6,1 1,1');

    const tl = gsap.timeline({ defaults: { ease: 'luxury' } });

    /* ── 1. Black screen start (GSAP sets initial states) ── */
    gsap.set([
      '#heroGlow', '#heroLabel', '#logoWrap', '#heroDivider',
      '#heroHeadline', '#heroSub', '#heroCta',
      '#heroBottomLabel', '#cTL', '#cTR', '#cBL', '#cBR',
      '#logoSweep'
    ], { opacity: 0 });

    gsap.set('#logoWrap', { scale: 0.88, filter: 'blur(18px)' });
    gsap.set('#heroHeadline', { y: 28, filter: 'blur(6px)' });
    gsap.set('#heroSub', { y: 18 });
    gsap.set('#heroCta', { y: 14 });
    gsap.set('#heroLabel', { y: -10 });
    gsap.set('#heroDivider', { scaleX: 0 });
    gsap.set('#heroBottomLabel', { y: 10 });

    /* ── 2. Timeline ── */

    // 2a. Background gold glow fades in softly
    tl.to('#heroGlow', {
      opacity: 1,
      duration: 2.8,
      ease: 'power2.inOut'
    }, 0.3);

    // 2b. Corner ornaments appear
    tl.to(['#cTL', '#cTR', '#cBL', '#cBR'], {
      opacity: 1,
      duration: 1.2,
      stagger: 0.12,
      ease: 'power2.out'
    }, 0.6);

    // 2c. Logo reveal — blur→clear, scale up, opacity in
    tl.to('#logoWrap', {
      opacity: 1,
      scale: 1,
      filter: 'blur(0px)',
      duration: 2.0,
      ease: 'power3.out'
    }, 1.0);

    // 2d. Metallic light sweep across logo
    tl.to('#logoSweep', {
      opacity: 1,
      duration: 0.1,
      ease: 'none'
    }, 2.8);

    tl.to('#logoSweep', {
      backgroundPosition: '220% 0',
      duration: 1.2,
      ease: 'power2.inOut'
    }, 2.85);

    tl.to('#logoSweep', {
      opacity: 0,
      duration: 0.5,
      ease: 'power2.out'
    }, 3.8);

    // 2e. Top label
    tl.to('#heroLabel', {
      opacity: 1,
      y: 0,
      duration: 1.1,
      ease: 'power2.out'
    }, 2.5);

    // 2f. Divider line
    tl.to('#heroDivider', {
      opacity: 1,
      scaleX: 1,
      duration: 1.0,
      transformOrigin: 'center center',
      ease: 'power2.inOut'
    }, 3.2);

    // 2g. Headline — SplitType word reveal
    const headlineEl = document.getElementById('heroHeadline');
    const st = new SplitType(headlineEl, { types: 'words' });
    // Wrap each word's inner content
    st.words.forEach(w => {
      const inner = document.createElement('span');
      inner.className = 'word-inner';
      inner.innerHTML = w.innerHTML;
      w.innerHTML = '';
      w.style.overflow = 'hidden';
      w.style.display = 'inline-block';
      w.style.verticalAlign = 'bottom';
      w.appendChild(inner);
    });

    gsap.set(headlineEl, { opacity: 1, y: 0, filter: 'blur(0px)' });
    const wordInners = headlineEl.querySelectorAll('.word-inner');

    tl.to(wordInners, {
      y: 0,
      opacity: 1,
      duration: 1.1,
      stagger: 0.065,
      ease: 'power3.out'
    }, 3.6);

    // 2h. Subheadline
    tl.to('#heroSub', {
      opacity: 1,
      y: 0,
      duration: 1.1,
      ease: 'power2.out'
    }, 4.5);

    // 2i. CTA buttons
    tl.to('#heroCta', {
      opacity: 1,
      y: 0,
      duration: 1.0,
      ease: 'power2.out'
    }, 5.1);

    // 2j. Bottom watermark
    tl.to('#heroBottomLabel', {
      opacity: 1,
      y: 0,
      duration: 1.0,
      ease: 'power2.out'
    }, 5.4);

    /* ── 3. Subtle ongoing ambient — glow breathes ── */
    gsap.to('#heroGlow', {
      opacity: 0.75,
      scale: 1.06,
      duration: 5,
      repeat: -1,
      yoyo: true,
      ease: 'sine.inOut',
      delay: 6
    });

  }); // end DOMContentLoaded
})();
</script>

</body>
</html>
